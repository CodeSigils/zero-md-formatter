name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"

    - name: Install dependencies
      run: npm ci

    - name: Run anti-drift checks
      run: node scripts/check-consistency.js

    - name: Download oxfmt binary
      run: |
        OXFMT_VERSION=$(node -e "const p=require('./package.json'); console.log(p.devDependencies.oxfmt.replace(/^\\^/,''))")
        curl -sL "https://github.com/oxc-project/oxc/releases/download/apps_v${OXFMT_VERSION}/oxfmt-x86_64-unknown-linux-musl.tar.gz" | tar xz
        chmod +x oxfmt
        echo "$PWD" >> $GITHUB_PATH

    - name: Verify oxfmt version
      run: |
        ./oxfmt --version
        EXPECTED=$(node -e "const p=require('./package.json'); console.log(p.devDependencies.oxfmt.replace(/^\\^/,''))")
        ACTUAL=$(./oxfmt --version | awk '{print $2}')
        if [ "$ACTUAL" != "$EXPECTED" ]; then
          echo "ERROR: oxfmt version mismatch (expected $EXPECTED, got $ACTUAL)"
          exit 1
        fi

    - name: Run structural guard tests
      run: npm test

    - name: Run formatter check (clean fixtures only)
      run: node skills/markdown-formatter/src/index.js --check --all test/fixtures/current/ test/fixtures/oxfmt-spike/

    - name: Run formatter check on MDX fixture
      run: node skills/markdown-formatter/src/index.js --check test/fixtures/current/sample.mdx

    - name: Test idempotence
      run: |
        mkdir -p /tmp/idempotence
        find test/fixtures/current/ test/fixtures/oxfmt-spike/ \( -name "*.md" -o -name "*.mdx" \) -exec cp {} /tmp/idempotence/ \;
        node skills/markdown-formatter/src/index.js --all /tmp/idempotence/
        cp -r /tmp/idempotence /tmp/idempotence_copy
        node skills/markdown-formatter/src/index.js --all /tmp/idempotence/
        diff -rq /tmp/idempotence /tmp/idempotence_copy && echo "Idempotence: PASS" || (echo "Idempotence: FAIL" && exit 1)
