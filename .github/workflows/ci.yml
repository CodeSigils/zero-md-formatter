name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  precheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .node-version
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Run anti-drift checks
      run: node scripts/check-consistency.js

    - name: Verify oxfmt version
      run: |
        OXFMT=./node_modules/.bin/oxfmt
        "$OXFMT" --version
        EXPECTED=$(node -e "const p=require('./package.json'); console.log(p.devDependencies.oxfmt)")
        ACTUAL=$("$OXFMT" --version | awk '{print $2}')
        if [ "$ACTUAL" != "$EXPECTED" ]; then
          echo "ERROR: oxfmt version mismatch (expected $EXPECTED, got $ACTUAL)"
          exit 1
        fi

  tests:
    needs: precheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        suite:
          - structural
          - unit-integr

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .node-version
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Run structural guard tests
      if: matrix.suite == 'structural'
      run: npm test

    - name: Run unit and integration tests
      if: matrix.suite == 'unit-integr'
      run: node --test test/unit/*.test.js test/integration/*.test.js

  verify:
    needs: [precheck, tests]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .node-version
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Verify staged runtime payload
      run: bash scripts/staged-install-verify.sh

    - name: Run maintainer docs formatter check
      run: npm run format:check

    - name: Fixture formatting check and idempotence
      # Checks formatting correctness (oxfmt --check) and idempotence (two-pass
      # format produces identical output) on temp copies of clean fixtures.
      # Structural validation is covered by the structural test matrix job.
      run: |
        trap 'rm -rf "$TMP_DIR"' EXIT
        TMP_DIR=$(mktemp -d)
        mkdir -p "$TMP_DIR/input/current" "$TMP_DIR/input/oxfmt-spike"
        cp -a test/fixtures/current/. "$TMP_DIR/input/current/"
        cp -a test/fixtures/oxfmt-spike/. "$TMP_DIR/input/oxfmt-spike/"

        # Verify formatting on copies (read-only)
        node skills/markdown-formatter/src/index.js --check --all "$TMP_DIR/input/"

        # First format pass
        node skills/markdown-formatter/src/index.js --all "$TMP_DIR/input/"
        cp -a "$TMP_DIR/input" "$TMP_DIR/after-first-pass"

        # Second format pass
        node skills/markdown-formatter/src/index.js --all "$TMP_DIR/input/"

        # Idempotence: second pass must produce identical output
        if diff -rq "$TMP_DIR/input" "$TMP_DIR/after-first-pass"; then
          echo "Idempotence: PASS"
        else
          echo "Idempotence: FAIL"
          exit 1
        fi
