name: CI

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'skills/**'
      - 'test/**'
      - '.github/workflows/ci.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.node-version'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'skills/**'
      - 'test/**'
      - '.github/workflows/ci.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.node-version'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  precheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version-file: .node-version
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Run anti-drift and release-drift checks
      env:
        CHECK_BASE_REF: ${{ github.event_name == 'push' && github.event.before || github.event.pull_request.base.sha }}
      run: node scripts/check-consistency.js

  tests:
    needs: precheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        suite:
          - structural
          - unit-integr

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version-file: .node-version
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Run structural guard tests
      if: matrix.suite == 'structural'
      run: npm run test:structural

    - name: Run unit and integration tests
      if: matrix.suite == 'unit-integr'
      run: node --test test/unit/*.test.js && node test/integration/cli.test.js

  verify:
    needs: [precheck, tests]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version-file: .node-version
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Verify staged runtime payload
      run: bash scripts/staged-install-verify.sh

    - name: Run maintainer docs formatter check
      run: npm run format:check

    - name: Fixture formatting check and idempotence
      run: |
        trap 'rm -rf "$TMP_DIR"' EXIT
        TMP_DIR=$(mktemp -d)
        mkdir -p "$TMP_DIR/input/current" "$TMP_DIR/input/format-edge-cases"
        cp -a test/fixtures/current/. "$TMP_DIR/input/current/"
        cp -a test/fixtures/format-edge-cases/. "$TMP_DIR/input/format-edge-cases/"
        node src/index.js --check --all "$TMP_DIR/input/"
        node src/index.js --all "$TMP_DIR/input/"
        cp -a "$TMP_DIR/input" "$TMP_DIR/after-first-pass"
        node src/index.js --all "$TMP_DIR/input/"
        if diff -rq "$TMP_DIR/input" "$TMP_DIR/after-first-pass"; then
          echo "Idempotence: PASS"
        else
          echo "Idempotence: FAIL"
          exit 1
        fi
