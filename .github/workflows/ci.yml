name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download oxfmt binary (Phase A - auto-download for CI)
      run: |
        curl -L https://github.com/oxc-project/oxc/releases/latest/download/oxfmt-x86_64-unknown-linux-musl.tar.gz | tar xz
        chmod +x oxfmt
        echo "$PWD" >> $GITHUB_PATH
    
    - name: Verify oxfmt is available
      run: oxfmt --version
    
    - name: Run structural guard tests
      run: npm test

    - name: Run formatter check
      run: npm run format:check -- test/fixtures/

    - name: Run formatter check on MDX fixture
      run: node skills/markdown-formatter/src/index.js --check test/fixtures/current/sample.mdx

    - name: Test idempotence
      run: |
        # Format all markdown and MDX files and capture output
        mkdir -p /tmp/formatted_first /tmp/formatted_second
        cp test/fixtures/*/*.md test/fixtures/*/*.mdx /tmp/formatted_first/ 2>/dev/null || true
        cp test/fixtures/*/*/*.md /tmp/formatted_first/ 2>/dev/null || true
        cp test/fixtures/*/*.md test/fixtures/*/*.mdx /tmp/formatted_second/ 2>/dev/null || true
        cp test/fixtures/*/*/*.md /tmp/formatted_second/ 2>/dev/null || true

        # Run formatter first time
        node skills/markdown-formatter/src/index.js /tmp/formatted_first/* 2>/dev/null || true

        # Run formatter second time on same files
        node skills/markdown-formatter/src/index.js /tmp/formatted_first/* 2>/dev/null || true

        # Compare the outputs - should be identical (no changes on second pass)
        diff -r /tmp/formatted_first /tmp/formatted_second && echo "Idempotence test passed" || (echo "Idempotence test failed: files changed on second pass" && exit 1)