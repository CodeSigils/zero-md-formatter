name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .node-version
        cache: "npm"

    - name: Install dependencies
      run: npm ci

    - name: Run anti-drift checks
      run: node scripts/check-consistency.js

    - name: Verify oxfmt version
      run: |
        OXFMT=./node_modules/.bin/oxfmt
        "$OXFMT" --version
        EXPECTED=$(node -e "const p=require('./package.json'); console.log(p.devDependencies.oxfmt)")
        ACTUAL=$("$OXFMT" --version | awk '{print $2}')
        if [ "$ACTUAL" != "$EXPECTED" ]; then
          echo "ERROR: oxfmt version mismatch (expected $EXPECTED, got $ACTUAL)"
          exit 1
        fi

    - name: Run structural guard tests
      run: npm test

    - name: Run unit tests
      run: npm run test:unit

    - name: Run integration tests
      run: npm run test:integration

    - name: Verify staged runtime payload
      run: bash scripts/staged-install-verify.sh

    - name: Run maintainer docs formatter check
      run: npm run format:check

    - name: Run formatter check on clean fixtures only
      run: node skills/markdown-formatter/src/index.js --check --all test/fixtures/current/ test/fixtures/oxfmt-spike/

    - name: Test idempotence on fixture copies
      run: |
        TMP_DIR=$(mktemp -d)
        trap 'rm -rf "$TMP_DIR"' EXIT
        mkdir -p "$TMP_DIR/input/current" "$TMP_DIR/input/oxfmt-spike"
        cp -a test/fixtures/current/. "$TMP_DIR/input/current/"
        cp -a test/fixtures/oxfmt-spike/. "$TMP_DIR/input/oxfmt-spike/"
        node skills/markdown-formatter/src/index.js --all "$TMP_DIR/input/"
        cp -a "$TMP_DIR/input" "$TMP_DIR/after-first-pass"
        node skills/markdown-formatter/src/index.js --all "$TMP_DIR/input/"
        diff -rq "$TMP_DIR/input" "$TMP_DIR/after-first-pass" && echo "Idempotence: PASS" || (echo "Idempotence: FAIL" && exit 1)
